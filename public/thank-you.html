<!doctype html>
<html lang="en-IN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <title>Thank You | Bhatnagar Packers & Movers</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --navy: #061f4f;
      --orange: #ff6b00;
      --yellow: #ffc928;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      color: var(--white);
      background: linear-gradient(135deg, var(--navy), #092f72);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(92vw, 640px);
      padding: 36px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    img {
      width: 120px;
      height: 80px;
      object-fit: cover;
      object-position: 50% 28%;
      margin: 0 auto 24px;
      border-radius: 4px;
    }

    h1 {
      margin: 0 0 14px;
      color: var(--yellow);
      font-size: clamp(32px, 6vw, 52px);
    }

    p {
      margin: 0 0 26px;
      line-height: 1.6;
      font-size: 18px;
    }

    a {
      display: inline-flex;
      padding: 13px 22px;
      color: var(--navy);
      background: var(--yellow);
      border-radius: 4px;
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <img src="/packers-movers-logo.png" alt="Bhatnagar Packers and Movers logo">
    <h1>Thank you</h1>
    <p>Your quote request has been submitted. Our team will contact you shortly.</p>
    <a href="/">Back to website</a>
  </main>
</body>
</html>
